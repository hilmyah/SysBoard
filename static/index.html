<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SysBoard</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0b0e12;
  --surface:#131820;
  --surface2:#1a2230;
  --border:#1e2d3d;
  --text:#b0c4d8;
  --text2:#5a7a94;
  --accent:#00d4a0;
  --danger:#e84a56;
  --success:#20c870;
  --warn:#f0a020;
  --blue:#30aaee;
}
html,body{background:var(--bg);color:var(--text);font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:13px;min-height:100vh;line-height:1.5}

/* ── Login ── */
#login{display:flex;align-items:center;justify-content:center;min-height:100vh}
.lbox{width:min(340px,92vw);background:var(--surface);border:1px solid var(--border);border-top:2px solid var(--accent);padding:32px 28px}
.lbox h1{font-size:20px;color:#fff;margin-bottom:4px}
.lbox p{font-size:11px;color:var(--text2);margin-bottom:24px;text-transform:uppercase;letter-spacing:1px}
.lbox label{display:block;font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.lbox input{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);font-family:inherit;font-size:13px;padding:9px 12px;outline:none}
.lbox input:focus{border-color:var(--accent)}
.lbtn{margin-top:16px;width:100%;background:var(--accent);color:#000;border:none;font-family:inherit;font-size:12px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:11px;cursor:pointer}
.lbtn:active{opacity:.85}
.lerr{color:var(--danger);font-size:11px;margin-top:10px;text-align:center;min-height:16px}

/* ── App shell ── */
#app{display:none;flex-direction:column;min-height:100vh}
.hdr{background:var(--surface);border-bottom:1px solid var(--border);padding:0 14px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100}
.hdr-brand{font-size:14px;font-weight:700;color:#fff;display:flex;align-items:center;gap:8px;padding:12px 0}
.hdr-dot{width:7px;height:7px;border-radius:50%;background:var(--accent)}
.hdr-stats{display:flex;gap:10px;font-size:11px;color:var(--text2)}
.hdr-stats b{color:var(--accent)}
.hdr-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.hdr-time{font-size:12px;color:var(--accent)}
.hdr-logout{background:none;border:1px solid var(--border);color:var(--text2);font-family:inherit;font-size:10px;padding:4px 10px;cursor:pointer;text-transform:uppercase;letter-spacing:1px}
.hdr-logout:hover{color:var(--text);border-color:var(--text2)}

/* ── Nav ── */
.nav{background:var(--bg);border-bottom:1px solid var(--border);display:flex;overflow-x:auto;scrollbar-width:none}
.nav::-webkit-scrollbar{display:none}
.nav-btn{background:none;border:none;border-bottom:2px solid transparent;color:var(--text2);font-family:inherit;font-size:11px;letter-spacing:1px;text-transform:uppercase;padding:11px 14px;cursor:pointer;white-space:nowrap}
.nav-btn:hover{color:var(--text)}
.nav-btn.on{color:var(--accent);border-bottom-color:var(--accent)}
.badge{display:inline-block;background:var(--surface2);border:1px solid var(--border);color:var(--text2);font-size:9px;padding:1px 5px;border-radius:8px;margin-left:4px;vertical-align:middle}

/* ── Content ── */
.content{padding:14px;flex:1}
.tab{display:none}.tab.on{display:block}

/* ── Stat grid ── */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px;margin-bottom:16px}
.stat{background:var(--surface);border:1px solid var(--border);padding:12px 14px}
.stat-label{font-size:9px;text-transform:uppercase;letter-spacing:1.5px;color:var(--text2);margin-bottom:6px}
.stat-val{font-size:22px;font-weight:700;color:#fff;line-height:1}
.stat-val.sm{font-size:16px}
.stat-sub{font-size:10px;color:var(--text2);margin-top:4px}
.bar{height:2px;background:var(--border);margin-top:8px}
.bar-fill{height:100%;transition:width .5s ease}

/* ── Disk row ── */
.disk-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px;margin-bottom:16px}
.disk{background:var(--surface2);border:1px solid var(--border);padding:10px 12px}
.disk-mount{font-size:11px;color:var(--blue);margin-bottom:2px;font-weight:600}

/* ── Section ── */
.sec{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--text2);margin:16px 0 10px;display:flex;align-items:center;gap:8px}
.sec::after{content:'';flex:1;height:1px;background:var(--border)}

/* ── Table shared ── */
.tbl{width:100%;border-collapse:collapse}
.tbl th{text-align:left;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text2);padding:7px 10px;border-bottom:1px solid var(--border)}
.tbl td{padding:8px 10px;border-bottom:1px solid var(--border);font-size:11px;vertical-align:middle}
.tbl tr:hover td{background:var(--surface2)}
.tbl .wrap{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:160px}

/* ── Pills ── */
.pill{font-size:9px;padding:2px 7px;border-radius:10px;font-weight:600;white-space:nowrap}
.p-active{background:rgba(32,200,112,.1);color:var(--success);border:1px solid rgba(32,200,112,.2)}
.p-inactive{background:rgba(90,122,148,.1);color:var(--text2);border:1px solid var(--border)}
.p-failed{background:rgba(232,74,86,.1);color:var(--danger);border:1px solid rgba(232,74,86,.2)}
.p-other{background:rgba(240,160,32,.1);color:var(--warn);border:1px solid rgba(240,160,32,.2)}

/* ── Action buttons ── */
.btns{display:flex;gap:3px}
.btn{border:1px solid var(--border);background:none;color:var(--text2);font-family:inherit;font-size:10px;padding:4px 8px;cursor:pointer}
.btn:active{opacity:.7}
.btn-g{border-color:rgba(32,200,112,.3);color:var(--success)}
.btn-r{border-color:rgba(232,74,86,.3);color:var(--danger)}
.btn-b{border-color:rgba(48,170,238,.3);color:var(--blue)}

/* ── Toolbar ── */
.toolbar{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;align-items:center}
.toolbar input{flex:1;min-width:160px;background:var(--surface);border:1px solid var(--border);color:var(--text);font-family:inherit;font-size:12px;padding:7px 10px;outline:none}
.toolbar input:focus{border-color:var(--accent)}
.toolbar .cnt{font-size:10px;color:var(--text2);margin-left:auto;white-space:nowrap}
.sort-btn{background:var(--surface);border:1px solid var(--border);color:var(--text2);font-family:inherit;font-size:10px;padding:5px 10px;cursor:pointer;white-space:nowrap}
.sort-btn.on{color:var(--accent);border-color:var(--accent)}

/* ── Process bar ── */
.cpu-bar{display:inline-block;background:var(--accent);height:6px;vertical-align:middle;min-width:1px;max-width:60px}

/* ── Log ── */
.log-wrap{background:var(--bg);border:1px solid var(--border)}
.log-bar{padding:8px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.log-bar span{font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--text2)}
.log-panel{padding:12px;font-size:10px;height:280px;overflow-y:auto;color:#6a9ab5;white-space:pre-wrap;line-height:1.6}
.log-panel::-webkit-scrollbar{width:3px}
.log-panel::-webkit-scrollbar-thumb{background:var(--border)}
.cmd-row{display:flex;gap:8px;padding:8px 12px;border-top:1px solid var(--border)}
.cmd-in{flex:1;background:transparent;border:none;color:var(--accent);font-family:inherit;font-size:12px;outline:none}
.cmd-in::placeholder{color:var(--text2)}
.btn-send{background:var(--accent);color:#000;border:none;font-family:inherit;font-size:10px;font-weight:700;padding:5px 12px;cursor:pointer}

/* ── Toast ── */
.toasts{position:fixed;bottom:16px;right:16px;z-index:9999;display:flex;flex-direction:column;gap:5px;pointer-events:none}
.toast{background:var(--surface2);border:1px solid var(--border);border-left:3px solid var(--accent);padding:9px 14px;font-size:11px;max-width:280px;animation:fin .2s}
.toast.err{border-left-color:var(--danger)}
.toast.warn{border-left-color:var(--warn)}
@keyframes fin{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}

/* ── Mobile specifics ── */
@media(max-width:480px){
  .stat-grid{grid-template-columns:repeat(2,1fr)}
  .disk-grid{grid-template-columns:repeat(2,1fr)}
  .hdr-stats{display:none}
  .tbl .hide-m{display:none}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login">
  <div class="lbox">
    <h1>SysBoard</h1>
    <p>System Dashboard</p>
    <label>Access Token</label>
    <input id="tok-in" type="password" placeholder="Enter token...">
    <button class="lbtn" id="login-btn">Authenticate</button>
    <div class="lerr" id="login-err"></div>
  </div>
</div>

<!-- APP -->
<div id="app">

  <div class="hdr">
    <div class="hdr-brand"><div class="hdr-dot"></div>SysBoard</div>
    <div class="hdr-stats">
      <span>CPU <b id="h-cpu">--</b></span>
      <span>RAM <b id="h-ram">--</b></span>
      <span id="h-temp-wrap">Temp <b id="h-temp">--</b></span>
    </div>
    <div class="hdr-right">
      <span class="hdr-time" id="clock"></span>
      <button class="hdr-logout" id="logout-btn">Logout</button>
    </div>
  </div>

  <div class="nav">
    <button class="nav-btn on" data-tab="overview">Overview</button>
    <button class="nav-btn" data-tab="processes">Processes</button>
    <button class="nav-btn" data-tab="services">Services <span class="badge" id="svc-count">0</span></button>
    <button class="nav-btn" data-tab="containers">Containers <span class="badge" id="ctr-count">0</span></button>
    <button class="nav-btn" id="mc-tab-btn" style="display:none" data-tab="minecraft">Minecraft</button>
  </div>

  <div class="content">

    <!-- OVERVIEW -->
    <div class="tab on" id="tab-overview">
      <div class="stat-grid">
        <div class="stat">
          <div class="stat-label">CPU</div>
          <div class="stat-val" id="cpu-val">--</div>
          <div class="stat-sub" id="load-val">Load: --</div>
          <div class="bar"><div class="bar-fill" id="cpu-bar"></div></div>
        </div>
        <div class="stat">
          <div class="stat-label">Memory</div>
          <div class="stat-val" id="ram-val">--</div>
          <div class="stat-sub" id="ram-sub">-- / --</div>
          <div class="bar"><div class="bar-fill" id="ram-bar"></div></div>
        </div>
        <div class="stat">
          <div class="stat-label">CPU Temp</div>
          <div class="stat-val sm" id="temp-val">--</div>
          <div class="stat-sub" id="temp-sub">--</div>
        </div>
        <div class="stat">
          <div class="stat-label">Uptime</div>
          <div class="stat-val sm" id="uptime-val">--</div>
          <div class="stat-sub" id="ts-val">--</div>
        </div>
        <div class="stat">
          <div class="stat-label">Net RX</div>
          <div class="stat-val sm" id="rx-rate">--</div>
          <div class="stat-sub" id="rx-total">Total: --</div>
        </div>
        <div class="stat">
          <div class="stat-label">Net TX</div>
          <div class="stat-val sm" id="tx-rate">--</div>
          <div class="stat-sub" id="tx-total">Total: --</div>
        </div>
      </div>

      <div class="sec">Disk</div>
      <div class="disk-grid" id="disk-grid"></div>
    </div>

    <!-- PROCESSES -->
    <div class="tab" id="tab-processes">
      <div class="toolbar">
        <input type="text" id="proc-filter" placeholder="Filter by name...">
        <span class="cnt" id="proc-count"></span>
      </div>
      <div style="overflow-x:auto">
        <table class="tbl">
          <thead>
            <tr>
              <th>Name</th>
              <th>PID</th>
              <th style="min-width:80px">CPU</th>
              <th>RAM</th>
              <th class="hide-m">User</th>
              <th class="hide-m">State</th>
            </tr>
          </thead>
          <tbody id="proc-tbody"></tbody>
        </table>
      </div>
    </div>

    <!-- SERVICES -->
    <div class="tab" id="tab-services">
      <div class="toolbar">
        <input type="text" id="svc-filter" placeholder="Search services...">
        <button class="sort-btn on" id="sort-name" data-sort="name">A-Z</button>
        <button class="sort-btn" id="sort-mem" data-sort="mem">RAM</button>
        <button class="sort-btn" id="sort-status" data-sort="status">Status</button>
        <span class="cnt" id="svc-cnt"></span>
      </div>
      <div style="overflow-x:auto">
        <table class="tbl">
          <thead>
            <tr>
              <th>Service</th>
              <th class="hide-m">RAM</th>
              <th class="hide-m">Uptime</th>
              <th>Status</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="svc-tbody"></tbody>
        </table>
      </div>
    </div>

    <!-- CONTAINERS -->
    <div class="tab" id="tab-containers">
      <div class="toolbar">
        <span class="cnt" id="ctr-cnt"></span>
        <button class="sort-btn" id="ctr-refresh">Refresh</button>
      </div>
      <div style="overflow-x:auto">
        <table class="tbl">
          <thead>
            <tr>
              <th>Name</th>
              <th class="hide-m">Image</th>
              <th>State</th>
              <th class="hide-m">Engine</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="ctr-tbody"></tbody>
        </table>
      </div>
    </div>

    <!-- MINECRAFT -->
    <div class="tab" id="tab-minecraft">
      <div class="log-wrap">
        <div class="log-bar">
          <span>Bedrock Log - last 50 lines</span>
          <button class="btn" id="mc-refresh">Refresh</button>
        </div>
        <div class="log-panel" id="mc-log"></div>
        <div class="cmd-row">
          <span style="color:var(--text2);margin-right:4px">&gt;</span>
          <input class="cmd-in" id="mc-cmd" type="text" placeholder="Type command and press Enter...">
          <button class="btn-send" id="mc-send">Send</button>
        </div>
      </div>
    </div>

  </div><!-- /content -->

  <div class="toasts" id="toasts"></div>
</div><!-- /app -->

<script>
'use strict';

// ── Utils ─────────────────────────────────────────────────────────────────────
const $ = id => document.getElementById(id);
const el = (tag, cls, text) => { const e = document.createElement(tag); if(cls) e.className = cls; if(text !== undefined) e.textContent = text; return e; };

function fmtB(b) {
  if (!b || b <= 0) return '0 B';
  const u = ['B','KiB','MiB','GiB','TiB']; let i = 0;
  while (b >= 1024 && i < u.length - 1) { b /= 1024; i++; }
  return b.toFixed(i ? 1 : 0) + ' ' + u[i];
}
function fmtRate(b) {
  if (!b || b <= 0) return '0 B/s';
  const u = ['B/s','KiB/s','MiB/s','GiB/s']; let i = 0;
  while (b >= 1024 && i < u.length - 1) { b /= 1024; i++; }
  return b.toFixed(i ? 1 : 0) + ' ' + u[i];
}
function barColor(p) { return p >= 90 ? 'var(--danger)' : p >= 70 ? 'var(--warn)' : 'var(--accent)'; }
function pillClass(a) {
  if (a === 'active' || a === 'running') return 'p-active';
  if (a === 'failed' || a === 'exited') return 'p-failed';
  if (a === 'inactive') return 'p-inactive';
  return 'p-other';
}

// ── Auth ──────────────────────────────────────────────────────────────────────
const tok = () => sessionStorage.getItem('sb_tok') || '';
const hdrs = () => ({ 'Content-Type': 'application/json', 'X-Auth-Token': tok() });

async function api(path, opts = {}) {
  const res = await fetch(path, { headers: hdrs(), ...opts });
  if (res.status === 401) { sessionStorage.removeItem('sb_tok'); location.reload(); throw new Error('unauth'); }
  return res;
}

// ── Toast ─────────────────────────────────────────────────────────────────────
function toast(msg, type = 'info') {
  const d = el('div', 'toast' + (type === 'err' ? ' err' : type === 'warn' ? ' warn' : ''), msg);
  $('toasts').appendChild(d);
  setTimeout(() => d.remove(), 3500);
}

// ── Login ─────────────────────────────────────────────────────────────────────
$('login-btn').onclick = doLogin;
$('tok-in').onkeydown = e => { if (e.key === 'Enter') doLogin(); };
async function doLogin() {
  const token = $('tok-in').value.trim();
  if (!token) return;
  try {
    const res = await fetch('/api/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ token }) });
    if (res.ok) { sessionStorage.setItem('sb_tok', token); startApp(); }
    else $('login-err').textContent = 'Invalid token';
  } catch (e) { $('login-err').textContent = 'Connection error'; }
}

// ── Tabs ──────────────────────────────────────────────────────────────────────
let activeTab = 'overview';
document.querySelectorAll('.nav-btn').forEach(btn => {
  btn.onclick = () => switchTab(btn.dataset.tab);
});
function switchTab(name) {
  activeTab = name;
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.toggle('on', b.dataset.tab === name));
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('on', t.id === 'tab-' + name));
  if (name === 'services' && !svcs.length) fetchServices();
  if (name === 'containers') fetchContainers();
  if (name === 'processes') fetchProcesses();
  if (name === 'minecraft') fetchMcLog();
}

// ── Logout ────────────────────────────────────────────────────────────────────
$('logout-btn').onclick = () => { sessionStorage.removeItem('sb_tok'); location.reload(); };

// ── Clock ─────────────────────────────────────────────────────────────────────
function tickClock() { $('clock').textContent = new Date().toTimeString().slice(0, 8); }

// ── Metrics ───────────────────────────────────────────────────────────────────
async function fetchMetrics() {
  try {
    const res = await api('/api/metrics');
    if (!res.ok) return;
    const m = await res.json();

    const cpu = m.cpu_percent || 0;
    const ram = m.ram_percent || 0;
    $('cpu-val').textContent = cpu.toFixed(1) + '%';
    $('load-val').textContent = 'Load: ' + (m.load_avg || '--');
    $('cpu-bar').style.cssText = `width:${Math.min(cpu, 100)}%;background:${barColor(cpu)}`;
    $('h-cpu').textContent = cpu.toFixed(1) + '%';

    $('ram-val').textContent = ram.toFixed(1) + '%';
    $('ram-sub').textContent = fmtB(m.ram_used) + ' / ' + fmtB(m.ram_total);
    $('ram-bar').style.cssText = `width:${Math.min(ram, 100)}%;background:${barColor(ram)}`;
    $('h-ram').textContent = ram.toFixed(1) + '%';

    if (m.cpu_temp > 0) {
      $('temp-val').textContent = m.cpu_temp.toFixed(1) + '\u00b0C';
      $('temp-sub').textContent = m.cpu_temp > 70 ? 'High' : 'Normal';
      $('h-temp').textContent = m.cpu_temp.toFixed(1) + '\u00b0C';
      $('h-temp-wrap').style.display = '';
    } else {
      $('temp-val').textContent = 'N/A';
      $('temp-sub').textContent = 'No sensor';
      $('h-temp-wrap').style.display = 'none';
    }

    $('uptime-val').textContent = m.uptime || '--';
    $('ts-val').textContent = 'Updated: ' + (m.timestamp || '--');

    $('rx-rate').textContent = fmtRate(m.net_rx_rate);
    $('rx-total').textContent = 'Total: ' + fmtB(m.net_rx_bytes);
    $('tx-rate').textContent = fmtRate(m.net_tx_rate);
    $('tx-total').textContent = 'Total: ' + fmtB(m.net_tx_bytes);

    // Disks
    const dg = $('disk-grid');
    dg.innerHTML = '';
    (m.disks || []).forEach(d => {
      const pct = d.percent ? d.percent.toFixed(1) : '0';
      const div = document.createElement('div');
      div.className = 'disk';
      div.innerHTML =
        `<div class="disk-mount">${d.mount}</div>` +
        `<div class="stat-sub">${fmtB(d.used)} / ${fmtB(d.total)}</div>` +
        `<div class="bar" style="margin-top:6px"><div class="bar-fill" style="width:${Math.min(d.percent||0,100)}%;background:${barColor(d.percent)}"></div></div>` +
        `<div class="stat-sub" style="margin-top:3px">${pct}% used</div>`;
      dg.appendChild(div);
    });
  } catch (e) {}
}

// ── Processes ─────────────────────────────────────────────────────────────────
let procs = [];
async function fetchProcesses() {
  try {
    const res = await api('/api/processes');
    if (!res.ok) return;
    procs = await res.json() || [];
    renderProcs();
  } catch(e) {}
}

function renderProcs() {
  const filter = $('proc-filter').value.toLowerCase();
  const list = filter ? procs.filter(p => p.name.toLowerCase().includes(filter)) : procs;
  $('proc-count').textContent = list.length + ' processes';
  const tb = $('proc-tbody');
  tb.innerHTML = '';
  list.forEach(p => {
    const cpuClamped = Math.min(p.cpu_pct || 0, 100);
    const barW = Math.round(cpuClamped * 0.6); // max 60px at 100%
    const tr = document.createElement('tr');
    tr.innerHTML =
      `<td style="color:#fff;font-weight:600">${esc(p.name)}</td>` +
      `<td style="color:var(--text2)">${p.pid}</td>` +
      `<td><span class="cpu-bar" style="width:${barW}px"></span> ${cpuClamped.toFixed(1)}%</td>` +
      `<td>${fmtB(p.mem_bytes)}</td>` +
      `<td class="hide-m" style="color:var(--text2)">${esc(p.user||'')}</td>` +
      `<td class="hide-m"><span class="pill ${p.state==='S'||p.state==='R'?'p-active':'p-other'}">${esc(p.state||'')}</span></td>`;
    tb.appendChild(tr);
  });
  if (!list.length) {
    const tr = document.createElement('tr');
    tr.innerHTML = '<td colspan="6" style="text-align:center;color:var(--text2);padding:20px">No processes</td>';
    tb.appendChild(tr);
  }
}
$('proc-filter').oninput = renderProcs;

// ── Services ──────────────────────────────────────────────────────────────────
let svcs = [], svcSort = 'name', svcAsc = true;

document.querySelectorAll('.sort-btn[data-sort]').forEach(btn => {
  btn.onclick = () => {
    const key = btn.dataset.sort;
    if (svcSort === key) svcAsc = !svcAsc;
    else { svcSort = key; svcAsc = key === 'name'; }
    document.querySelectorAll('.sort-btn[data-sort]').forEach(b => b.classList.toggle('on', b.dataset.sort === svcSort));
    renderServices();
  };
});

async function fetchServices() {
  try {
    const res = await api('/api/services');
    if (!res.ok) return;
    svcs = await res.json() || [];
    $('svc-count').textContent = svcs.length;
    renderServices();
  } catch(e) {}
}

function renderServices() {
  const filter = $('svc-filter').value.toLowerCase();
  let list = filter ? svcs.filter(s => s.name.toLowerCase().includes(filter) || (s.desc||'').toLowerCase().includes(filter)) : [...svcs];
  list.sort((a, b) => {
    let v = 0;
    if (svcSort === 'name') v = a.name.localeCompare(b.name);
    else if (svcSort === 'mem') v = (a.mem_bytes||0) - (b.mem_bytes||0);
    else if (svcSort === 'status') {
      const o = { active:0, failed:1, inactive:2 };
      v = (o[a.active]??3) - (o[b.active]??3);
    }
    return svcAsc ? v : -v;
  });
  $('svc-cnt').textContent = list.length + ' services';
  const tb = $('svc-tbody');
  tb.innerHTML = '';
  list.forEach(s => {
    const tr = document.createElement('tr');
    tr.innerHTML =
      `<td><div style="color:#fff;font-weight:600">${esc(s.name)}</div><div style="font-size:10px;color:var(--text2);max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(s.desc||'')}</div></td>` +
      `<td class="hide-m">${s.mem_bytes > 0 ? fmtB(s.mem_bytes) : '<span style="color:var(--text2)">--</span>'}</td>` +
      `<td class="hide-m" style="color:var(--text2)">${esc(s.uptime_str||'--')}</td>` +
      `<td><span class="pill ${pillClass(s.active)}">${esc(s.sub||s.active)}</span></td>` +
      `<td><div class="btns">` +
        `<button class="btn btn-g" onclick="svcAction('${esc(s.name)}','start')">start</button>` +
        `<button class="btn btn-r" onclick="svcAction('${esc(s.name)}','stop')">stop</button>` +
        `<button class="btn btn-b" onclick="svcAction('${esc(s.name)}','restart')">&#8635;</button>` +
      `</div></td>`;
    tb.appendChild(tr);
  });
  if (!list.length) {
    const tr = document.createElement('tr');
    tr.innerHTML = '<td colspan="5" style="text-align:center;color:var(--text2);padding:20px">No services</td>';
    tb.appendChild(tr);
  }
}
$('svc-filter').oninput = renderServices;

async function svcAction(svc, action) {
  try {
    const res = await api('/api/services/action', { method: 'POST', body: JSON.stringify({ service: svc, action }) });
    const d = await res.json();
    if (d.error) toast(d.error, 'err');
    else { toast(svc + ': ' + action); setTimeout(fetchServices, 1000); }
  } catch(e) {}
}

// ── Containers ────────────────────────────────────────────────────────────────
let ctrs = [];

async function fetchContainers() {
  try {
    const res = await api('/api/containers');
    if (!res.ok) return;
    ctrs = await res.json() || [];
    $('ctr-count').textContent = ctrs.length;
    renderContainers();
  } catch(e) {}
}

function renderContainers() {
  $('ctr-cnt').textContent = ctrs.length + ' containers';
  const tb = $('ctr-tbody');
  tb.innerHTML = '';
  ctrs.forEach(c => {
    const tr = document.createElement('tr');
    tr.innerHTML =
      `<td style="color:#fff;font-weight:600">${esc(c.name)}</td>` +
      `<td class="hide-m wrap" style="color:var(--text2)">${esc(c.image)}</td>` +
      `<td><span class="pill ${pillClass(c.state)}">${esc(c.state)}</span></td>` +
      `<td class="hide-m" style="color:var(--text2)">${esc(c.engine)}</td>` +
      `<td><div class="btns">` +
        `<button class="btn btn-g" onclick="ctrAction('${esc(c.id)}','${esc(c.engine)}','start')">start</button>` +
        `<button class="btn btn-r" onclick="ctrAction('${esc(c.id)}','${esc(c.engine)}','stop')">stop</button>` +
        `<button class="btn btn-b" onclick="ctrAction('${esc(c.id)}','${esc(c.engine)}','restart')">&#8635;</button>` +
      `</div></td>`;
    tb.appendChild(tr);
  });
  if (!ctrs.length) {
    const tr = document.createElement('tr');
    tr.innerHTML = '<td colspan="5" style="text-align:center;color:var(--text2);padding:20px">No containers detected</td>';
    tb.appendChild(tr);
  }
}
$('ctr-refresh').onclick = fetchContainers;

async function ctrAction(id, engine, action) {
  try {
    await api('/api/containers/action', { method: 'POST', body: JSON.stringify({ id, engine, action }) });
    toast(id.slice(0, 8) + ': ' + action);
    setTimeout(fetchContainers, 1000);
  } catch(e) {}
}

// ── Minecraft ─────────────────────────────────────────────────────────────────
async function fetchMcLog() {
  try {
    const res = await api('/api/mc/log');
    if (!res.ok) return;
    const d = await res.json();
    const el = $('mc-log');
    el.textContent = d.log;
    el.scrollTop = el.scrollHeight;
  } catch(e) {}
}
$('mc-refresh').onclick = fetchMcLog;
$('mc-send').onclick = sendMcCmd;
$('mc-cmd').onkeydown = e => { if (e.key === 'Enter') sendMcCmd(); };

async function sendMcCmd() {
  const cmd = $('mc-cmd').value.trim();
  if (!cmd) return;
  try {
    await api('/api/mc/command', { method: 'POST', body: JSON.stringify({ command: cmd }) });
    toast('Command sent');
    $('mc-cmd').value = '';
    setTimeout(fetchMcLog, 800);
  } catch(e) {}
}

// ── Escape HTML to prevent XSS ────────────────────────────────────────────────
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Boot ──────────────────────────────────────────────────────────────────────
async function startApp() {
  $('login').style.display = 'none';
  $('app').style.display = 'flex';

  // Check minecraft
  try {
    const r = await api('/api/mc/log');
    if (r.ok) {
      const d = await r.json();
      if (!d.log.includes('not accessible')) {
        $('mc-tab-btn').style.display = '';
      }
    }
  } catch(e) {}

  tickClock();
  setInterval(tickClock, 1000);
  fetchMetrics();
  fetchServices();
  setInterval(fetchMetrics, 4000);
  setInterval(fetchServices, 12000);
  setInterval(() => { if (activeTab === 'processes') fetchProcesses(); }, 5000);
  setInterval(() => { if (activeTab === 'minecraft') fetchMcLog(); }, 5000);
  setInterval(() => { if (activeTab === 'containers') fetchContainers(); }, 10000);
}

// Auto-login if token already stored
window.addEventListener('DOMContentLoaded', () => {
  const t = tok();
  if (t) {
    fetch('/api/metrics', { headers: hdrs() }).then(r => {
      if (r.ok) startApp();
      else sessionStorage.removeItem('sb_tok');
    }).catch(() => sessionStorage.removeItem('sb_tok'));
  }
});
</script>
